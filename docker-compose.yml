version: "3.8"

services:
  webhookd:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tiny-hookd
    restart: unless-stopped
    ports:
      - "${WEBHOOKD_PORT:-8080}:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - WHD_SCRIPTS=/var/opt/webhookd/scripts
      - WHD_LOG_LEVEL=${WHD_LOG_LEVEL:-info}
    volumes:
      - ./scripts:/var/opt/webhookd/scripts:ro
      - ./logs:/var/log/webhookd
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
